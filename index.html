<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SQL Path — Interactive Course</title>
  <style>
    :root {
      --bg: #0c0f14;
      --surface: #151b24;
      --surface2: #1c2430;
      --border: #2a3545;
      --text: #e8edf4;
      --muted: #8b9aaf;
      --accent: #58cc02;
      --accent-dim: #3d8f01;
      --blue: #1cb0f6;
      --blue-dim: #0e7cae;
      --gold: #ffc800;
      --err: #ff4b4b;
      --mono: "Cascadia Code", "Fira Code", Consolas, monospace;
    }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; font-family: system-ui, Segoe UI, sans-serif; background: var(--bg); color: var(--text); line-height: 1.55; }
    a { color: var(--blue); }
    .app { display: flex; min-height: 100vh; }
    .sidebar {
      width: 280px; flex-shrink: 0; background: var(--surface); border-right: 1px solid var(--border);
      display: flex; flex-direction: column; max-height: 100vh; position: sticky; top: 0;
    }
    .sidebar-head { padding: 1rem 1rem 0.75rem; border-bottom: 1px solid var(--border); }
    .sidebar-head h1 { margin: 0; font-size: 1.1rem; font-weight: 800; letter-spacing: -0.02em; }
    .sidebar-head .sub { margin: 0.35rem 0 0; font-size: 0.78rem; color: var(--muted); }
    .xp-bar { margin-top: 0.65rem; height: 8px; background: var(--surface2); border-radius: 99px; overflow: hidden; border: 1px solid var(--border); }
    .xp-fill { height: 100%; background: linear-gradient(90deg, var(--accent-dim), var(--accent)); width: 0%; transition: width 0.35s ease; }
    .xp-label { font-size: 0.7rem; color: var(--muted); margin-top: 0.25rem; }
    .nav-scroll { flex: 1; overflow-y: auto; padding: 0.5rem 0 1rem; }
    .unit { margin-top: 0.5rem; }
    .unit-title { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); padding: 0.5rem 1rem 0.25rem; }
    .lesson-btn {
      display: flex; align-items: center; gap: 0.5rem; width: 100%; text-align: left;
      padding: 0.55rem 1rem; border: none; background: transparent; color: var(--text);
      font: inherit; cursor: pointer; border-left: 3px solid transparent;
    }
    .lesson-btn:hover { background: var(--surface2); }
    .lesson-btn.active { background: var(--surface2); border-left-color: var(--blue); }
    .lesson-btn.locked { opacity: 0.45; cursor: not-allowed; }
    .lesson-btn .idx { font-size: 0.75rem; color: var(--muted); width: 1.5rem; }
    .lesson-btn .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--border); flex-shrink: 0; }
    .lesson-btn.done .dot { background: var(--accent); box-shadow: 0 0 0 2px rgba(88,204,2,0.25); }
    .lesson-btn .lbl { flex: 1; font-size: 0.88rem; }
    .lesson-btn .tag { font-size: 0.62rem; text-transform: uppercase; color: var(--muted); }
    .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
    .topbar { padding: 0.65rem 1.25rem; border-bottom: 1px solid var(--border); background: var(--surface); display: flex; align-items: center; justify-content: space-between; gap: 1rem; flex-wrap: wrap; }
    .topbar h2 { margin: 0; font-size: 1rem; font-weight: 700; }
    .progress-track { flex: 1; max-width: 320px; height: 10px; background: var(--surface2); border-radius: 99px; border: 1px solid var(--border); overflow: hidden; }
    .progress-fill { height: 100%; background: var(--blue); width: 0%; transition: width 0.4s ease; }
    .content { flex: 1; display: grid; grid-template-columns: minmax(0, 1fr) minmax(320px, 1fr); gap: 0; border-bottom: 1px solid var(--border); }
    @media (max-width: 960px) { .content { grid-template-columns: 1fr; } .sidebar { display: none; } .sidebar.open { display: flex; position: fixed; z-index: 50; height: 100%; } }
    .teach { padding: 1.25rem 1.5rem; overflow-y: auto; max-height: calc(100vh - 120px); border-right: 1px solid var(--border); background: #0f1318; }
    .teach h2 { margin: 0 0 0.75rem; font-size: 1.15rem; }
    .teach h3 { margin: 1.25rem 0 0.5rem; font-size: 0.95rem; color: var(--blue); }
    .teach p { margin: 0 0 0.85rem; color: #c5ced9; font-size: 0.92rem; }
    .teach pre { margin: 0 0 1rem; padding: 0.85rem 1rem; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; overflow-x: auto; font-family: var(--mono); font-size: 0.8rem; line-height: 1.4; color: #b8e0ff; }
    .teach code { font-family: var(--mono); font-size: 0.86em; background: var(--surface2); padding: 0.1em 0.35em; border-radius: 4px; }
    .teach ul { margin: 0 0 1rem; padding-left: 1.25rem; color: #c5ced9; font-size: 0.92rem; }
    .callout { border-left: 4px solid var(--gold); padding: 0.65rem 0.85rem; background: rgba(255,200,0,0.08); border-radius: 0 8px 8px 0; margin-bottom: 1rem; font-size: 0.88rem; }
    .workspace { display: flex; flex-direction: column; min-height: 420px; background: var(--bg); }
    .panel-head { display: flex; align-items: center; justify-content: space-between; padding: 0.45rem 0.75rem; background: var(--surface2); border-bottom: 1px solid var(--border); font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); }
    #sql-input { flex: 1; width: 100%; min-height: 200px; margin: 0; padding: 0.85rem; border: none; resize: vertical; font-family: var(--mono); font-size: 0.82rem; line-height: 1.45; background: var(--bg); color: var(--text); }
    #sql-input:focus { outline: 2px solid var(--blue-dim); outline-offset: -2px; }
    .toolbar { display: flex; flex-wrap: wrap; gap: 0.4rem; padding: 0.5rem 0.75rem; border-top: 1px solid var(--border); background: var(--surface); }
    button { font: inherit; cursor: pointer; border: 1px solid var(--border); background: #243044; color: var(--text); padding: 0.45rem 0.85rem; border-radius: 8px; font-size: 0.82rem; }
    button:hover { filter: brightness(1.08); }
    button.primary { background: var(--blue-dim); border-color: var(--blue); color: #fff; font-weight: 600; }
    button.success { background: var(--accent-dim); border-color: var(--accent); color: #fff; font-weight: 700; }
    button.ghost { background: transparent; }
    #output { flex: 1; overflow: auto; padding: 0.75rem; font-family: var(--mono); font-size: 0.76rem; min-height: 140px; max-height: 280px; border-top: 1px solid var(--border); }
    .msg { padding: 0.55rem 0.75rem; border-radius: 8px; margin-bottom: 0.6rem; white-space: pre-wrap; word-break: break-word; font-family: system-ui, sans-serif; font-size: 0.85rem; }
    .msg.ok { background: rgba(88,204,2,0.12); color: #9ee86a; border: 1px solid rgba(88,204,2,0.35); }
    .msg.err { background: rgba(255,75,75,0.1); color: #ff8a8a; border: 1px solid rgba(255,75,75,0.35); }
    .msg.info { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }
    table.result { border-collapse: collapse; width: 100%; margin-bottom: 0.75rem; font-size: 0.74rem; }
    table.result th, table.result td { border: 1px solid var(--border); padding: 0.3rem 0.45rem; text-align: left; }
    table.result th { background: var(--surface); color: var(--muted); }
    .footer-actions { padding: 1rem 1.5rem; display: flex; flex-wrap: wrap; gap: 0.5rem; align-items: center; background: var(--surface); border-top: 1px solid var(--border); }
    .footer-actions .spacer { flex: 1; }
    #menu-toggle { display: none; }
    @media (max-width: 960px) { #menu-toggle { display: inline-flex; } }
    .toast { position: fixed; bottom: 1.25rem; right: 1.25rem; padding: 0.85rem 1.1rem; background: var(--accent-dim); color: #fff; font-weight: 700; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.4); z-index: 100; animation: pop 0.35s ease; }
    @keyframes pop { from { transform: translateY(12px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .learn-only #workspace-panel { display: none; }
    .learn-only .content { grid-template-columns: 1fr; }
    .learn-only .teach { border-right: none; max-height: none; }
    .project-final .teach .no-hint { color: var(--muted); font-style: italic; }
    .lesson-btn .tag.challenge { color: var(--gold); }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-head">
        <h1>SQL Path</h1>
        <p class="sub">Deep, slow-paced track — many practices per topic + a solo mini-lab at the end of each unit. SQLite in-browser (sql.js).</p>
        <div class="xp-bar"><div class="xp-fill" id="xp-fill"></div></div>
        <div class="xp-label" id="xp-label">0 XP</div>
      </div>
      <nav class="nav-scroll" id="nav"></nav>
    </aside>

    <div class="main">
      <div class="topbar">
        <button type="button" class="ghost" id="menu-toggle">☰ Menu</button>
        <h2 id="lesson-title">Loading…</h2>
        <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
      </div>

      <div class="content" id="content-grid">
        <article class="teach" id="teach"></article>
        <div class="workspace" id="workspace-panel">
          <div class="panel-head"><span>Your SQL</span><span>Ctrl+Enter run · Shift+Ctrl+Enter check</span></div>
          <textarea id="sql-input" spellcheck="false"></textarea>
          <div class="toolbar">
            <button type="button" class="primary" id="btn-run">Run</button>
            <button type="button" class="success" id="btn-check">Check</button>
            <button type="button" id="btn-reset-lesson">Reset lesson DB</button>
            <button type="button" id="btn-clear">Clear editor</button>
          </div>
          <div class="panel-head"><span>Output</span><span id="status-dot">…</span></div>
          <div id="output"></div>
        </div>
      </div>

      <div class="footer-actions">
        <button type="button" class="primary" id="btn-continue" style="display:none">Continue</button>
        <span class="spacer"></span>
        <span style="font-size:0.75rem;color:var(--muted)" id="footer-hint"></span>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/sql.js@1.11.0/dist/sql-wasm.js"></script>
  <script>
(function () {
  const PROGRESS_KEY = "sql-path-progress-v4";
  const XP_PER = 10;

  const el = {
    nav: document.getElementById("nav"),
    teach: document.getElementById("teach"),
    input: document.getElementById("sql-input"),
    output: document.getElementById("output"),
    status: document.getElementById("status-dot"),
    title: document.getElementById("lesson-title"),
    progressFill: document.getElementById("progress-fill"),
    xpFill: document.getElementById("xp-fill"),
    xpLabel: document.getElementById("xp-label"),
    btnRun: document.getElementById("btn-run"),
    btnCheck: document.getElementById("btn-check"),
    btnReset: document.getElementById("btn-reset-lesson"),
    btnClear: document.getElementById("btn-clear"),
    btnContinue: document.getElementById("btn-continue"),
    contentGrid: document.getElementById("content-grid"),
    workspace: document.getElementById("workspace-panel"),
    footerHint: document.getElementById("footer-hint"),
    sidebar: document.getElementById("sidebar"),
    menuToggle: document.getElementById("menu-toggle"),
  };

  let SQL = null;
  let lessonDb = null;
  let currentLessonIndex = 0;
  let progress = { done: {}, xp: 0, currentIndex: 0 };

  function escapeHtml(s) {
    return String(s)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  function loadProgress() {
    try {
      const raw = localStorage.getItem(PROGRESS_KEY);
      if (raw) progress = JSON.parse(raw);
    } catch (_) {}
    if (!progress.done) progress.done = {};
    if (typeof progress.xp !== "number") progress.xp = 0;
    if (typeof progress.currentIndex !== "number") progress.currentIndex = 0;
  }

  function saveProgress() {
    localStorage.setItem(PROGRESS_KEY, JSON.stringify(progress));
  }

  function toast(msg) {
    const t = document.createElement("div");
    t.className = "toast";
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 2200);
  }

  function normalizeCell(v) {
    if (v === null || v === undefined) return "NULL";
    if (typeof v === "number" && Number.isFinite(v)) return String(v);
    return String(v);
  }

  function resultMatch(actual, expected, ignoreRowOrder) {
    if (!actual || actual.length === 0) return expected.length === 0;
    const a = actual[0];
    const exp = expected[0];
    if (!exp) return true;
    if (JSON.stringify(a.columns) !== JSON.stringify(exp.columns)) return false;
    const va = (a.values || []).map((r) => r.map(normalizeCell));
    const ve = (exp.values || []).map((r) => r.map(normalizeCell));
    if (va.length !== ve.length) return false;
    if (ignoreRowOrder) {
      const sa = va.map((r) => JSON.stringify(r)).sort();
      const se = ve.map((r) => JSON.stringify(r)).sort();
      return JSON.stringify(sa) === JSON.stringify(se);
    }
    return JSON.stringify(va) === JSON.stringify(ve);
  }

  function execAll(db, sql) {
    return db.exec(sql);
  }

  function freshLessonDb(seedSql) {
    if (lessonDb) try { lessonDb.close(); } catch (_) {}
    lessonDb = new SQL.Database();
    if (seedSql && seedSql.trim()) lessonDb.exec(seedSql);
  }

  function renderTable(block) {
    if (!block || !block.columns || block.columns.length === 0) return "";
    let h = "<table class='result'><thead><tr>";
    for (const c of block.columns) h += "<th>" + escapeHtml(c) + "</th>";
    h += "</tr></thead><tbody>";
    for (const row of block.values || []) {
      h += "<tr>";
      for (const cell of row) h += "<td>" + escapeHtml(normalizeCell(cell)) + "</td>";
      h += "</tr>";
    }
    return h + "</tbody></table>";
  }

  function appendOut(html) {
    el.output.insertAdjacentHTML("beforeend", html);
  }

  function clearOut() {
    el.output.innerHTML = "";
  }

  function setStatus(t) {
    el.status.textContent = t;
  }

  const LESSONS = [];

  function L(spec) {
    LESSONS.push(spec);
  }

  /** For SELECT-only steps: run user SQL on seeded DB and compare to expectSql on same data. */
  function checkSelect(seed, expectSql, ignoreOrder, failMsg) {
    return function () {
      const user = el.input.value.trim();
      const d = new SQL.Database();
      if (seed && seed.trim()) d.exec(seed);
      let got;
      try {
        got = d.exec(user);
      } catch (e) {
        d.close();
        return { ok: false, msg: e.message || String(e) };
      }
      let exp;
      try {
        exp = d.exec(expectSql);
      } catch (e) {
        d.close();
        return { ok: false, msg: "Verification query failed internally." };
      }
      d.close();
      if (!got.length) return { ok: false, msg: "Your query produced no result set." };
      if (!resultMatch(got, exp, !!ignoreOrder))
        return { ok: false, msg: failMsg || "Columns, rows, or order do not match the assignment." };
      return { ok: true };
    };
  }

  /* ——— Curriculum ——— */
  L({ id: "intro", kind: "learn", title: "Welcome — how databases think", narrative: `
<h2>Why SQL takes time to master</h2>
<p>SQL looks small on paper, but it is a <em>different way of thinking</em> than writing loops in Python or JavaScript. You describe <strong>what</strong> you want the database to return or how rows should change, and the engine figures out <strong>how</strong> to do it efficiently.</p>
<p>This track is intentionally <strong>slow</strong>: several reading steps and many small practices per idea, then a <strong>mini-lab</strong> at the end of each unit where you work alone with only a checklist — no solution nudges from the checker.</p>
<h3>What is a relational database?</h3>
<p>Data lives in <strong>tables</strong>. Each table has named <strong>columns</strong> (fields) and many <strong>rows</strong> (records). Tables can reference each other with <strong>keys</strong>, which keeps data consistent when applications grow.</p>
<h3>SQLite here, SQL everywhere else</h3>
<p>We use <strong>SQLite</strong> in your browser. Syntax is close to PostgreSQL and MySQL; minor differences (dates, some functions) exist, but <code>SELECT</code>, <code>JOIN</code>, <code>GROUP BY</code>, and keys work the same ideas everywhere.</p>
<h3>How to use this site</h3>
<ul>
<li><strong>Learn</strong> — read carefully; press <strong>Continue</strong> when you are ready.</li>
<li><strong>Practice</strong> — use <strong>Run</strong> freely; <strong>Check</strong> grades against the assignment (you may get specific hints).</li>
<li><strong>Mini-lab</strong> — only requirements + pass/fail; treat it like a take-home exam for that unit.</li>
</ul>
<div class="callout">Use <strong>Reset lesson DB</strong> whenever your practice database drifts. <strong>Tab</strong> indents in the editor.</div>
` });

  L({ id: "learn-types", kind: "learn", title: "Types, NULL, and row integrity", narrative: `
<h2>Column types (SQLite)</h2>
<p>SQLite uses dynamic typing but still names types in <code>CREATE TABLE</code>: <code>INTEGER</code>, <code>REAL</code>, <code>TEXT</code>, <code>BLOB</code>. In practice: ids and counts are integers, money often <code>REAL</code> (or integers of cents in production), free text is <code>TEXT</code>.</p>
<h3>NULL</h3>
<p><code>NULL</code> means “unknown / not applicable.” It is <strong>not</strong> the same as zero or an empty string. Comparisons like <code>WHERE col = NULL</code> are wrong — use <code>IS NULL</code> or <code>IS NOT NULL</code>.</p>
<h3>NOT NULL and defaults</h3>
<p><code>NOT NULL</code> forbids missing values in that column. <code>DEFAULT</code> fills in a value when an insert omits the column — useful for timestamps or flags.</p>
<pre>CREATE TABLE note (
  id INTEGER PRIMARY KEY,
  body TEXT NOT NULL,
  created_at TEXT DEFAULT (datetime('now'))
);</pre>
` });

  L({ id: "learn-ddl", kind: "learn", title: "Designing tables with CREATE TABLE", narrative: `
<h2>CREATE TABLE walkthrough</h2>
<p>Every column has a name and a declared type. One column is usually the <strong>primary key</strong>: unique per row. In SQLite, <code>INTEGER PRIMARY KEY</code> often acts as an auto-incrementing row id.</p>
<pre>CREATE TABLE album (
  id INTEGER PRIMARY KEY,
  title TEXT NOT NULL,
  artist TEXT NOT NULL,
  year INTEGER
);</pre>
<h3>Naming</h3>
<p>Use consistent plural or singular table names across a project. Column names are usually <code>snake_case</code>. Foreign keys often mirror the referenced table: <code>artist_id</code> referencing <code>artists(id)</code>.</p>
<h3>Comments</h3>
<p>SQL line comments start with <code>--</code>. Use them to leave notes in scripts you hand in for mini-labs.</p>
` });

  L({ id: "p-books", kind: "practice", title: "Practice: table books", narrative: `
<h2>Task</h2>
<p>From an empty database, create <code>books</code> with <code>id</code> integer primary key, <code>title</code> text not null, <code>pages</code> integer (nullable is fine).</p>
`, seed: "", starter: "CREATE TABLE books (\n\n);\n", validate(db) {
    const t = db.exec("SELECT name FROM sqlite_master WHERE type='table' AND name='books'");
    if (!t.length || !t[0].values.length) return { ok: false, msg: "Table books missing." };
    const info = db.exec("PRAGMA table_info(books)");
    const rows = info[0].values || [];
    const byName = Object.fromEntries(rows.map((r) => [r[1], { type: String(r[2]).toUpperCase(), notnull: r[3], pk: r[5] }]));
    if (!byName.id || byName.id.pk !== 1) return { ok: false, msg: "id should be primary key." };
    if (!byName.title || byName.title.notnull !== 1) return { ok: false, msg: "title should be NOT NULL." };
    if (!byName.pages || !byName.pages.type.includes("INT")) return { ok: false, msg: "pages should be an integer type." };
    return { ok: true };
  } });

  L({ id: "p-products", kind: "practice", title: "Practice: table products", narrative: `
<h2>Task</h2>
<p>Create <code>products</code>: <code>sku</code> text primary key, <code>name</code> text not null, <code>price</code> real not null, <code>stock</code> integer not null default 0 (SQLite: <code>DEFAULT 0</code>).</p>
`, seed: "", starter: "CREATE TABLE products (\n\n);\n", validate(db) {
    const t = db.exec("SELECT name FROM sqlite_master WHERE type='table' AND name='products'");
    if (!t.length || !t[0].values.length) return { ok: false, msg: "Table products missing." };
    const info = db.exec("PRAGMA table_info(products)");
    const rows = info[0].values || [];
    const by = Object.fromEntries(rows.map((r) => [r[1], { type: String(r[2]).toUpperCase(), notnull: r[3], dflt: r[4], pk: r[5] }]));
    if (!by.sku || by.sku.pk !== 1) return { ok: false, msg: "sku should be the primary key." };
    if (!by.name || by.name.notnull !== 1) return { ok: false, msg: "name NOT NULL required." };
    if (!by.price || by.price.notnull !== 1 || !by.price.type.includes("REAL") && !by.price.type.includes("FLO") && !by.price.type.includes("NUM")) return { ok: false, msg: "price should be REAL NOT NULL." };
    if (!by.stock || by.stock.notnull !== 1) return { ok: false, msg: "stock INTEGER NOT NULL required." };
    return { ok: true };
  } });

  L({ id: "p-seed-insert", kind: "practice", title: "Practice: insert three rows", narrative: `
<h2>Task</h2>
<p>The seed creates empty table <code>band_member</code> (<code>id</code> integer PK, <code>name</code> text not null). Insert <strong>exactly three</strong> rows with distinct names of your choice. Your script may only use inserts (no extra DDL).</p>
`, seed: "CREATE TABLE band_member (id INTEGER PRIMARY KEY, name TEXT NOT NULL);", starter: "INSERT INTO band_member (name) VALUES ('...');\n", validate(db) {
    const c = db.exec("SELECT COUNT(*) FROM band_member")[0].values[0][0];
    if (c !== 3) return { ok: false, msg: "Need exactly 3 rows in band_member." };
    return { ok: true };
  } });

  L({ id: "p-select-warmup", kind: "practice", title: "Practice: first SELECTs", narrative: `
<h2>Task</h2>
<p>Seeded table <code>scores</code> (<code>player</code>, <code>points</code>). Write <strong>one</strong> <code>SELECT</code> returning columns <code>player</code> and <code>points</code> for rows where <code>points &gt;= 10</code>, ordered by <code>points</code> descending, then <code>player</code> ascending.</p>
`, seed: "CREATE TABLE scores (player TEXT, points INTEGER); INSERT INTO scores VALUES ('Ann',12),('Ben',9),('Cam',15),('Dan',12);",
    starter: "SELECT player, points\nFROM scores\n",
    validate: checkSelect(
      "CREATE TABLE scores (player TEXT, points INTEGER); INSERT INTO scores VALUES ('Ann',12),('Ben',9),('Cam',15),('Dan',12);",
      "SELECT player, points FROM scores WHERE points >= 10 ORDER BY points DESC, player ASC",
      false,
      "Expected Cam, Dan, Ann in that order with correct points."
    ) });

  L({ id: "ch1", kind: "challenge", title: "Mini-lab: reading list (solo)", narrative: `
<h2>Unit 1 mini-lab — no extra hints</h2>
<p class="no-hint">Work from an empty database. Meet <strong>all</strong> requirements; the checker only reports pass/fail.</p>
<ol style="color:#c5ced9;font-size:0.92rem">
<li><code>PRAGMA foreign_keys = ON;</code> at the top.</li>
<li>Table <code>genres</code>: <code>id</code> integer PK, <code>name</code> text not null unique.</li>

  L({ id: "learn-select-where", kind: "learn", title: "SELECT and WHERE in depth", narrative: `
<h2>Thinking in sets</h2>
<p><code>SELECT</code> produces a <strong>result set</strong>: a temporary table of rows and columns. <code>WHERE</code> filters <em>before</em> projection; only rows that pass the predicate survive.</p>
<h3>Combining predicates</h3>
<p>Use <code>AND</code>, <code>OR</code>, and parentheses. Without parentheses, <code>AND</code> binds tighter than <code>OR</code> — when in doubt, parenthesize.</p>
<h3>IN, BETWEEN, LIKE</h3>
<ul>
<li><code>status IN ('open','pending')</code></li>
<li><code>price BETWEEN 10 AND 20</code> — inclusive endpoints.</li>
<li><code>name LIKE 'A%'</code> — <code>%</code> wildcard; <code>_</code> single char. Case sensitivity depends on collation (SQLite’s default is case-insensitive for ASCII letters in LIKE).</li>
</ul>
<h3>Escaping mistakes</h3>
<p>String literals use single quotes. Double quotes are for identifiers in SQLite — avoid mixing them up.</p>
` });

<p>Keeps only combinations where the <code>ON</code> predicate holds. This is the default join for “show me related data.”</p>

  L({ id: "learn-agg", kind: "learn", title: "Aggregates, GROUP BY, HAVING", narrative: `
<h2>Aggregate functions</h2>
<p><code>COUNT(*)</code> counts rows; <code>COUNT(col)</code> counts non-null values. <code>SUM</code>, <code>AVG</code>, <code>MIN</code>, <code>MAX</code> summarize numeric or comparable data.</p>
<h2>GROUP BY</h2>
<p>Put non-aggregated columns from the <code>SELECT</code> list into <code>GROUP BY</code>. Each group becomes one output row.</p>
<h2>HAVING</h2>
<p>Filters groups after aggregation — e.g. “only customers with more than two orders.” Cannot reference SELECT aliases in all engines; SQLite allows some alias use in <code>HAVING</code> in recent versions, but repeating the expression is safest in homework.</p>
` });

<h2>Subqueries in WHERE</h2>
<p><code>WHERE id IN (SELECT …)</code> filters by a set produced dynamically. Correlated subqueries reference outer tables and run conceptually per outer row — powerful but easy to make slow on huge data.</p>
<h2>EXISTS</h2>
<p><code>WHERE EXISTS (SELECT 1 FROM … WHERE …)</code> stops at first match; idiomatic for “is there any related row?”</p>
<h2>Common Table Expressions</h2>
<pre>WITH big AS (SELECT * FROM sales WHERE amount > 100)
SELECT customer_id, SUM(amount) FROM big GROUP BY customer_id;</pre>
<p>CTEs make multi-step logic readable and can be recursive in SQLite for trees — advanced topic for later.</p>
` });

  L({ id: "learn-constraints", kind: "learn", title: "CHECK, UNIQUE, and data rules", narrative: `
<h2>Beyond NOT NULL</h2>
<p><code>CHECK (expression)</code> rejects inserts/updates that make the expression false. Use it for ranges (<code>price &gt;= 0</code>), allowed sets (<code>status IN ('a','b')</code>), or cross-column rules (<code>end_date &gt;= start_date</code>).</p>
<h2>UNIQUE</h2>
<p>A <code>UNIQUE</code> constraint on one or more columns forbids duplicate combinations — the database enforces “this value (or tuple) can only appear once.” Primary keys are unique by definition.</p>
<h2>When rules live in SQL</h2>
<p>App-level validation is still important for UX, but database constraints are the last line of defense when multiple apps or scripts touch the same data.</p>
` });

  L({ id: "learn-indexes", kind: "learn", title: "Indexes and how queries use them", narrative: `
<h2>What an index does</h2>
<p>A <strong>B-tree index</strong> is a separate structure that speeds up lookups and sorts on chosen columns — at the cost of extra storage and slightly slower writes (the index must be maintained).</p>
<pre>CREATE INDEX idx_orders_customer ON orders(customer_id);</pre>
<h2>Composite indexes</h2>
<p><code>CREATE INDEX idx ON t(a, b)</code> helps queries that filter or sort on <code>a</code>, or on <code>a</code> and <code>b</code> together. Column order matters: leading prefix rules apply.</p>
<h2>EXPLAIN QUERY PLAN</h2>
<p>In SQLite, <code>EXPLAIN QUERY PLAN SELECT …</code> shows whether the optimizer can use an index (look for <code>USING INDEX</code>). It is a habit worth building when tuning slow reports.</p>
` });

  L({ id: "learn-transactions", kind: "learn", title: "Transactions: BEGIN, COMMIT, ROLLBACK", narrative: `
<h2>ACID in one connection</h2>
<p>A <strong>transaction</strong> groups changes so they succeed together or not at all. In SQLite: <code>BEGIN;</code> (or <code>BEGIN TRANSACTION;</code>), then <code>COMMIT;</code> to persist or <code>ROLLBACK;</code> to discard.</p>
<h2>Why it matters</h2>
<p>Transferring money between accounts, posting a sale with line items, or bulk imports should not leave half-written state if something fails mid-way.</p>
<h2>SAVEPOINT</h2>
<p><code>SAVEPOINT name</code> / <code>ROLLBACK TO name</code> lets you nest partial rollbacks inside a larger transaction — useful in complex scripts.</p>
` });

  L({ id: "learn-windows", kind: "learn", title: "Window functions (OVER)", narrative: `
<h2>What changes with windows</h2>
<p>Normal aggregates collapse rows. <strong>Window functions</strong> compute a value <em>per row</em> using a “window” of related rows: <code>PARTITION BY</code> splits groups, <code>ORDER BY</code> inside <code>OVER</code> defines order for ranking or running totals.</p>
<pre>SELECT
  region,
  amount,
  ROW_NUMBER() OVER (PARTITION BY region ORDER BY amount DESC) AS rn
FROM sales;</pre>
<h2>Common functions</h2>
<p><code>ROW_NUMBER()</code>, <code>RANK()</code>, <code>DENSE_RANK()</code>, <code>SUM(x) OVER (...)</code>, <code>LAG(col)</code> / <code>LEAD(col)</code> — availability matches your SQLite version (sql.js ships a recent SQLite).</p>
` });

<h2>Conflicting inserts</h2>
<p>When a row would violate <code>UNIQUE</code> or <code>PRIMARY KEY</code>, SQLite can <code>ON CONFLICT … DO NOTHING</code> (skip) or <code>DO UPDATE SET …</code> (merge) — often called “upsert.”</p>
<pre>INSERT INTO counters(k, v) VALUES ('hits', 1)
ON CONFLICT(k) DO UPDATE SET v = v + 1;</pre>
<p><code>INSERT OR REPLACE</code> deletes and reinserts the row, which can reset columns you did not specify — prefer <code>ON CONFLICT</code> when you need fine control.</p>
` });

  L({ id: "learn-self-join", kind: "learn", title: "Self-joins & reporting hierarchies", narrative: `
<h2>Same table, two roles</h2>
<p>Join a table to itself with different aliases — classic pattern for employees and managers (<code>staff m</code> for manager, <code>staff e</code> for employee), or for parts and substitute parts.</p>
<pre>SELECT e.name, m.name AS manager

` });

  L({ id: "capstone", kind: "project", title: "Capstone: school enrollment (solo)", narrative: `
<h2>Final project — on your own</h2>
<p class="no-hint">No hints beyond this list. Combines schema, data, joins, aggregates, and views.</p>
<h3>Requirements</h3>
<ol style="color:#c5ced9;font-size:0.92rem">
<li><code>PRAGMA foreign_keys = ON;</code></li>
<li>Tables <code>students</code> (<code>id</code> integer PK, <code>full_name</code> text not null, <code>enrolled_date</code> text), <code>courses</code> (<code>id</code> integer PK, <code>title</code> text not null, <code>credits</code> integer not null), <code>enrollments</code> (<code>student_id</code> references students, <code>course_id</code> references courses, <code>grade</code> text nullable, primary key <code>(student_id, course_id)</code>).</li>
<li>At least 4 students, 3 courses, 6 enrollments; ≥2 grades NULL; ≥3 grades are numeric text like <code>'88'</code>.</li>
<li>View <code>v_student_course_counts</code>: <code>student_name</code>, <code>course_count</code> — enrollments per student including zeros.</li>
<li>View <code>v_course_avg_grade</code>: <code>title</code>, <code>avg_grade</code> — average <code>CAST(grade AS REAL)</code> for non-null grades, by course; only courses with ≥1 graded enrollment.</li>
<li>Full script runs without errors.</li>
</ol>
`, seed: "", starter: "PRAGMA foreign_keys = ON;\n\n", validate(db) {
    try { db.exec("PRAGMA foreign_keys = ON;"); } catch (_) {}
    const need = ["students", "courses", "enrollments"];
    for (const n of need) {
      const t = db.exec("SELECT name FROM sqlite_master WHERE type='table' AND name='" + n + "'");
      if (!t.length || !t[0].values.length) return { ok: false, msg: "Capstone check failed (schema)." };
    }
    const fk = db.exec("PRAGMA foreign_key_list(enrollments)");
    if (!fk.length || fk[0].values.length < 2) return { ok: false, msg: "Capstone check failed (relationships)." };
    const pk = db.exec("PRAGMA table_info(enrollments)");
    const rows = pk[0].values || [];
    const cols = rows.map((r) => r[1]);
    if (!cols.includes("student_id") || !cols.includes("course_id") || !cols.includes("grade")) return { ok: false, msg: "Capstone check failed (enrollments columns)." };
    const pkCols = rows.filter((r) => r[5] > 0);
    if (pkCols.length < 2) return { ok: false, msg: "Capstone check failed (composite key on enrollments)." };
    const cStu = db.exec("SELECT COUNT(*) FROM students")[0].values[0][0];
    const cCou = db.exec("SELECT COUNT(*) FROM courses")[0].values[0][0];
    const cEnr = db.exec("SELECT COUNT(*) FROM enrollments")[0].values[0][0];
    if (cStu < 4 || cCou < 3 || cEnr < 6) return { ok: false, msg: "Capstone check failed (minimum data)." };
    const nullGrades = db.exec("SELECT COUNT(*) FROM enrollments WHERE grade IS NULL")[0].values[0][0];
    const numGrades = db.exec("SELECT COUNT(*) FROM enrollments WHERE grade GLOB '*[0-9]*' AND grade IS NOT NULL")[0].values[0][0];
    if (nullGrades < 2 || numGrades < 3) return { ok: false, msg: "Capstone check failed (grade pattern rules)." };
    const v1 = db.exec("SELECT name FROM sqlite_master WHERE type='view' AND name='v_student_course_counts'");
    const v2 = db.exec("SELECT name FROM sqlite_master WHERE type='view' AND name='v_course_avg_grade'");
    if (!v1.length || !v1[0].values.length || !v2.length || !v2[0].values.length) return { ok: false, msg: "Capstone check failed (views missing)." };
    const truthCounts = db.exec(`
SELECT s.full_name AS student_name,
       (SELECT COUNT(*) FROM enrollments e WHERE e.student_id = s.id) AS course_count
FROM students s
ORDER BY student_name
`);
    const gotCounts = db.exec("SELECT student_name, course_count FROM v_student_course_counts ORDER BY student_name");
    if (!resultMatch(gotCounts, truthCounts, false)) return { ok: false, msg: "Capstone check failed (v_student_course_counts)." };
    const truthAvg = db.exec(`
SELECT c.title AS title,
       printf("%.6f", AVG(CAST(e.grade AS REAL))) AS avg_grade
FROM courses c
JOIN enrollments e ON e.course_id = c.id
WHERE e.grade IS NOT NULL
GROUP BY c.id, c.title
HAVING COUNT(e.grade) >= 1
ORDER BY title
`);
    const gotAvg = db.exec(`
SELECT title, printf("%.6f", avg_grade) AS avg_grade
FROM v_course_avg_grade
ORDER BY title
`);
    if (!resultMatch(gotAvg, truthAvg, false)) return { ok: false, msg: "Capstone check failed (v_course_avg_grade)." };
    return { ok: true };
  } });

  function lessonLocked(i) {
    if (i === 0) return false;
    const prev = LESSONS[i - 1];
    return !progress.done[prev.id];
  }

  function renderNav() {
    const units = [
      { name: "1 · Foundations & DDL", range: [0, 7] },
      { name: "2 · Filtering rows", range: [8, 12] },
      { name: "3 · Sorting & NULL", range: [13, 16] },
      { name: "4 · Changing data", range: [17, 20] },
      { name: "5 · Keys & relations", range: [21, 24] },
      { name: "6 · JOINs", range: [25, 29] },
      { name: "7 · Aggregates", range: [30, 33] },
      { name: "8 · Subqueries & CTEs", range: [34, 38] },
      { name: "9 · UNION & cleanup", range: [39, 41] },
      { name: "10 · Constraints & indexes", range: [42, 47] },
      { name: "11 · Transactions", range: [48, 51] },
      { name: "12 · CASE & dates", range: [52, 55] },
      { name: "13 · Window functions", range: [56, 59] },
      { name: "14 · Upsert", range: [60, 62] },
      { name: "15 · Self-joins", range: [63, 65] },
      { name: "16 · Capstone", range: [66, 66] },
    ];
    let html = "";
    for (const u of units) {
      html += `<div class="unit"><div class="unit-title">${escapeHtml(u.name)}</div>`;
      for (let i = u.range[0]; i <= u.range[1]; i++) {
        const Ls = LESSONS[i];
        const locked = lessonLocked(i);
        const done = !!progress.done[Ls.id];
        html += `<button type="button" class="lesson-btn ${i === currentLessonIndex ? "active" : ""} ${done ? "done" : ""} ${locked ? "locked" : ""}" data-i="${i}" ${locked ? "disabled" : ""}>
          <span class="idx">${i + 1}</span><span class="dot"></span>
          <span class="lbl">${escapeHtml(Ls.title)}</span>
          <span class="tag ${Ls.kind === "challenge" ? "challenge" : ""}">${Ls.kind === "learn" ? "learn" : Ls.kind === "project" ? "capstone" : Ls.kind === "challenge" ? "mini-lab" : "practice"}</span>
        </button>`;
      }
      html += `</div>`;
    }
    el.nav.innerHTML = html;
    el.nav.querySelectorAll(".lesson-btn:not(.locked)").forEach((b) => {
      b.addEventListener("click", () => goLesson(+b.getAttribute("data-i")));
    });
  }

  function updateChrome() {
    const total = LESSONS.length;
    const doneCount = LESSONS.filter((l) => progress.done[l.id]).length;
    el.progressFill.style.width = Math.round((doneCount / total) * 100) + "%";
    el.xpFill.style.width = Math.min(100, (progress.xp / (total * XP_PER)) * 100) + "%";
    el.xpLabel.textContent = progress.xp + " XP · " + doneCount + "/" + total + " complete";
  }

  function goLesson(i) {
    if (i < 0 || i >= LESSONS.length) return;
    if (lessonLocked(i)) return;
    currentLessonIndex = i;
    const Ls = LESSONS[i];
    el.title.textContent = Ls.title;
    el.teach.innerHTML = Ls.narrative;
    el.input.value = Ls.starter || "";
    el.footerHint.textContent =
      Ls.kind === "learn"
        ? "Read the lesson, then press Continue."
        : Ls.kind === "project" || Ls.kind === "challenge"
          ? "Solo work: follow the instructions only. The checker will not teach the answer."
          : "Write SQL, Run to experiment, Check to validate.";
    document.body.classList.toggle("learn-only", Ls.kind === "learn");
    document.body.classList.toggle("project-final", Ls.kind === "project" || Ls.kind === "challenge");
    el.btnContinue.style.display = Ls.kind === "learn" ? "inline-flex" : "none";
    el.btnCheck.style.display = Ls.kind === "learn" ? "none" : "inline-flex";
    clearOut();
    setStatus("Ready");
    freshLessonDb(Ls.seed || "");
    progress.currentIndex = i;
    saveProgress();
    renderNav();
    updateChrome();
    el.sidebar.classList.remove("open");
  }

  function runOnLessonDb(sql, append) {
    if (!append) clearOut();
    const trimmed = sql.trim();
    if (!trimmed) {
      appendOut("<div class='msg info'>Nothing to run.</div>");
      return;
    }
    try {
      const results = lessonDb.exec(trimmed);
      if (results.length === 0) appendOut("<div class='msg ok'>OK (no result set).</div>");
      else for (const b of results) appendOut(renderTable(b));
      setStatus("Ran · " + new Date().toLocaleTimeString());
    } catch (e) {
      appendOut("<div class='msg err'>" + escapeHtml(e.message || String(e)) + "</div>");
      setStatus("Error");
    }
  }

  function buildDbFromUserScript(seed, userSql) {
    const d = new SQL.Database();
    try { d.exec("PRAGMA foreign_keys = ON;"); } catch (_) {}
    if (seed && seed.trim()) d.exec(seed);
    d.exec(userSql);
    return d;
  }

  function checkPractice() {
    const Ls = LESSONS[currentLessonIndex];
    if (Ls.kind === "learn") return;
    clearOut();
    const userSql = el.input.value.trim();
    if (!userSql) {
      appendOut("<div class='msg err'>Write some SQL first.</div>");
      return;
    }
    let testDb;
    try {
      testDb = buildDbFromUserScript(Ls.seed || "", userSql);
    } catch (e) {
      appendOut("<div class='msg err'>" + escapeHtml(e.message || String(e)) + "</div>");
      setStatus("Error");
      return;
    }
    let res;
    try {
      res = Ls.validate(testDb);
    } catch (e) {
      res = {
        ok: false,
        msg:
          Ls.kind === "project" || Ls.kind === "challenge"
            ? "Check failed — re-read the requirements."
            : e.message || String(e),
      };
    }
    try { testDb.close(); } catch (_) {}

    if (!res.ok) {
      appendOut("<div class='msg err'>" + escapeHtml(res.msg) + "</div>");
      setStatus("Try again");
      return;
    }
    appendOut("<div class='msg ok'><strong>Correct!</strong> Lesson complete.</div>");
    setStatus("Solved");
    if (!progress.done[Ls.id]) {
      progress.done[Ls.id] = true;
      progress.xp += XP_PER;
      saveProgress();
      toast("+" + XP_PER + " XP");
    }
    renderNav();
    updateChrome();
  }

  el.btnRun.addEventListener("click", () => runOnLessonDb(el.input.value, false));
  el.btnClear.addEventListener("click", () => { el.input.value = ""; el.input.focus(); });
  el.btnReset.addEventListener("click", () => {
    const Ls = LESSONS[currentLessonIndex];
    freshLessonDb(Ls.seed || "");
    clearOut();
    appendOut("<div class='msg ok'>Lesson database reset.</div>");
    setStatus("Ready");
  });
  el.btnCheck.addEventListener("click", checkPractice);
  el.btnContinue.addEventListener("click", () => {
    const Ls = LESSONS[currentLessonIndex];
    if (Ls.kind !== "learn") return;
    if (!progress.done[Ls.id]) {
      progress.done[Ls.id] = true;
      progress.xp += XP_PER;
      saveProgress();
      toast("+" + XP_PER + " XP");
    }
    if (currentLessonIndex + 1 < LESSONS.length) goLesson(currentLessonIndex + 1);
    else toast("Course complete!");
    renderNav();
    updateChrome();
  });

  const INDENT = "  ";

  el.input.addEventListener("keydown", (ev) => {
    if (ev.key === "Tab") {
      ev.preventDefault();
      const ta = el.input;
      const val = ta.value;
      const start = ta.selectionStart;
      const end = ta.selectionEnd;
      if (ev.shiftKey) {
        const before = val.slice(0, start);
        const sel = val.slice(start, end);
        const after = val.slice(end);
        const lines = sel.split("\n");
        const out = lines
          .map((line) => {
            if (line.startsWith(INDENT)) return line.slice(INDENT.length);
            if (line.startsWith("\t")) return line.slice(1);
            return line;
          })
          .join("\n");
        ta.value = before + out + after;
        ta.selectionStart = start;
        ta.selectionEnd = start + out.length;
      } else {
        if (start === end) {
          ta.value = val.slice(0, start) + INDENT + val.slice(end);
          ta.selectionStart = ta.selectionEnd = start + INDENT.length;
        } else {
          const before = val.slice(0, start);
          const sel = val.slice(start, end);
          const after = val.slice(end);
          const out = sel.split("\n").map((line) => INDENT + line).join("\n");
          ta.value = before + out + after;
          ta.selectionStart = start;
          ta.selectionEnd = start + out.length;
        }
      }
      return;
    }
    if (ev.key === "Enter" && ev.ctrlKey && ev.shiftKey) {
      ev.preventDefault();
      checkPractice();
    } else if (ev.key === "Enter" && ev.ctrlKey) {
      ev.preventDefault();
      runOnLessonDb(el.input.value, false);
    }
  });

  el.menuToggle.addEventListener("click", () => el.sidebar.classList.toggle("open"));

  initSqlJs({
    locateFile: (f) => "https://cdn.jsdelivr.net/npm/sql.js@1.11.0/dist/" + f,
  }).then((Module) => {
    SQL = Module;
    loadProgress();
    renderNav();
    let idx = progress.currentIndex;
    if (idx < 0 || idx >= LESSONS.length) idx = 0;
    if (lessonLocked(idx)) {
      const first = LESSONS.findIndex((_, i) => !lessonLocked(i));
      idx = first >= 0 ? first : 0;
    }
    goLesson(idx);
  }).catch((err) => {
    el.teach.innerHTML = "<p>Could not load sql.js: " + escapeHtml(err.message) + "</p>";
  });
})();
  </script>
</body>
